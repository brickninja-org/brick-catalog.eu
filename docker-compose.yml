services:
  web:
    image: brickcatalog/web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://brickcatalog:brickcatalog@database:5432/brickcatalog?schema=public
      - BC_URL=http://brickcatalog.localhost:3000
      - FORCE_COLOR=1
    ports:
      - 3000:3000

  worker:
    image: brickcatalog/worker
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - database
      - database-migration
    environment:
      - DATABASE_URL=postgresql://brickcatalog:brickcatalog@database:5432/brickcatalog?schema=public
    deploy:
      replicas: 2

  database:
    image: timescale/timescaledb:2.26.2-pg17@sha256:af79ea8fa31ee989aa5c8b0183cff2e0170eaf741832ce698cca7e0241205808
    restart: unless-stopped
    environment:
      - POSTGRES_USER=brickcatalog
      - POSTGRES_PASSWORD=brickcatalog
      - POSTGRES_DB=brickcatalog
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - .docker/database-pg17:/var/lib/postgresql/data
    ports:
      - 54326:5432

  database-migration:
    image: brickcatalog/database-migration
    build:
      context: .
      dockerfile: apps/database-migration/Dockerfile
    restart: on-failure:3
    depends_on:
      - database
    environment:
      - DATABASE_URL=postgresql://brickcatalog:brickcatalog@database:5432/brickcatalog?schema=public
